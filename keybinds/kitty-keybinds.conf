
# vim:ft=kitty

clear_all_shortcuts yes

# Config management
map f5 load_config_file
map kitty_mod+f1 show_kitty_doc
map kitty_mod+f2 edit_config_file

# Clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Output and URL management
map ctrl+shift+g show_last_command_output
map ctrl+shift+e open_url_with_hints

# Tab management
map ctrl+shift+t set_tab_title
map alt+a new_tab_with_cwd
map alt+q close_tab
map alt+. next_tab
map alt+, previous_tab
map alt+shift+. move_tab_forward
map alt+shift+, move_tab_backward
map alt+tab goto_tab -1

# Tab number navigation
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9

# Window management
map alt+enter new_window_with_cwd
map alt+c close_window
map alt+b move_window_backward
map alt+f move_window_forward
map alt+t move_window_to_top

# Scrolling
map page_up scroll_page_up
map page_down scroll_page_down
map shift+home scroll_home
map shift+end scroll_end
map alt+shift+up scroll_to_prompt -1
map alt+shift+down scroll_to_prompt 1

# ============================================================================
# WINDOW NAVIGATION (Smart Splits Integration)
# ============================================================================
# Window navigation
map ctrl+left  neighboring_window left
map ctrl+down  neighboring_window down
map ctrl+up    neighboring_window up
map ctrl+right neighboring_window right

# Disable window navigation when in Neovim
map --when-focus-on var:IS_NVIM ctrl+left
map --when-focus-on var:IS_NVIM ctrl+down
map --when-focus-on var:IS_NVIM ctrl+up
map --when-focus-on var:IS_NVIM ctrl+right

# Window resizing
map alt+down  kitten relative_resize.py down  10
map alt+up    kitten relative_resize.py up    10
map alt+left  kitten relative_resize.py left  10
map alt+right kitten relative_resize.py right 10

# Disable window resizing when in Neovim
map --when-focus-on var:IS_NVIM alt+down
map --when-focus-on var:IS_NVIM alt+up
map --when-focus-on var:IS_NVIM alt+left
map --when-focus-on var:IS_NVIM alt+right

# ============================================================================
# FIX XOFF FLOW CONTROL (Ctrl+S freezes terminal)
# ============================================================================
# Prevents Ctrl+S from sending XOFF to the terminal, which would freeze
# output and block Neovim's <C-w>s split command.
map ctrl+s discard_event
