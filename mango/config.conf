# More option see https://github.com/DreamMaoMao/mango/wiki/

exec-once = swaybg -i /home/eydgn/.files/wallpapers/blue-abstract.png
exec-once = waybar -c /home/eydgn/.files/waybar/config.jsonc -s /home/eydgn/.files/waybar/style.css
exec-once = waybar -c /home/eydgn/.files/waybar/config-portrait.jsonc -s /home/eydgn/.files/waybar/style.css

border_radius=0
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 1-horizontal,0-vertical
animations=1
layer_animations=1
animation_type_open=zoom
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.4
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=350
animation_duration_open=275
animation_duration_tag=250
animation_duration_close=500
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Master-Stack Layout Setting
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=1

# Overview Setting
hotarea_size=10
enable_hotarea=0
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=1
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=1
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1
drag_tile_small=1

# keyboard
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=us

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
gappih=0
gappiv=0
gappoh=0
gappov=0
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=1
rootcolor=0x1e1e2eff
bordercolor=0x585b70ff
dropcolor=0x11111b55
splitcolor=0xcba6f7ff
focuscolor=0x89b4faff
maximizescreencolor=0xa6e3a1ff
urgentcolor=0xf38ba8ff
scratchpadcolor=0xf5c2e7ff
globalcolor=0xfab387ff
overlaycolor=0x313244ff

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# layer rule
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi

# monitor
monitorrule=name:DP-1,width:3840,height:2160,refresh:60,x:0,y:0
monitorrule=name:HDMI-A-1,width:1920,height:1080,refresh:60,x:3840,y:0,rr:3

source=~/.config/mango/env.conf
source=~/.config/mango/private.conf
source=~/.config/mango/keybinds.conf
